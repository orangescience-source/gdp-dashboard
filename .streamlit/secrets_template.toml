# ============================================================
# YouTube 채널 전략 도구 — Streamlit Secrets 설정 템플릿
# ============================================================
# 사용법:
#   1. 이 파일을 복사하여 `.streamlit/secrets.toml` 로 저장
#   2. 각 값을 실제 키/토큰으로 교체
#   3. secrets.toml 은 절대 git 에 커밋하지 마세요!
#      (.gitignore 에 .streamlit/secrets.toml 이 포함되어 있는지 확인)
# ============================================================

# ── Claude API (필수) ────────────────────────────────────────
# 발급: https://console.anthropic.com/account/keys
ANTHROPIC_API_KEY = "sk-ant-..."

# ── 티스토리 자동 포스팅 (선택) ──────────────────────────────
# 앱 등록: https://www.tistory.com/guide/api/manage/register
# Access Token 발급 후 아래에 입력
TISTORY_ACCESS_TOKEN = "your_tistory_access_token"

# 블로그 주소에서 서브도메인 부분만 입력
# 예) myblog.tistory.com → myblog
TISTORY_BLOG_NAME = "your_blog_name"
